<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Rural Advisory"/>
<meta name="theme-color" content="#1b4332"/>
<title>🌾 Rural Advisory System v2.0</title>

<!-- PWA Manifest (inline via JS) -->
<script>
(function(){
  const manifest = {
    name: "Rural Advisory System",
    short_name: "RuralAdvisory",
    description: "AI-powered crop disease detection for Indian farmers",
    start_url: "./",
    display: "standalone",
    background_color: "#1b4332",
    theme_color: "#1b4332",
    orientation: "any",
    icons: [
      { src: "https://via.placeholder.com/192x192/1b4332/74c69d?text=🌾", sizes: "192x192", type: "image/png" },
      { src: "https://via.placeholder.com/512x512/1b4332/74c69d?text=🌾", sizes: "512x512", type: "image/png" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = url;
  document.head.appendChild(link);
})();
</script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>

<!-- React + Babel -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Recharts -->
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

<style>
/* ═══════════════════════════════
   DESIGN SYSTEM
═══════════════════════════════ */
:root {
  --green-900: #0d2818;
  --green-800: #1b4332;
  --green-700: #2d6a4f;
  --green-600: #40916c;
  --green-500: #52b788;
  --green-400: #74c69d;
  --green-200: #b7e4c7;
  --green-50:  #d8f3dc;
  --cream:     #fefce8;
  --amber:     #f59e0b;
  --red:       #ef4444;
  --orange:    #f97316;
  --sky:       #0ea5e9;
  --white:     #ffffff;
  --gray-50:   #f9fafb;
  --gray-100:  #f3f4f6;
  --gray-200:  #e5e7eb;
  --gray-400:  #9ca3af;
  --gray-600:  #4b5563;
  --gray-800:  #1f2937;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 20px rgba(0,0,0,.10);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.15);
  --radius:    14px;
  --radius-sm: 8px;
  /* Mobile bottom nav height */
  --bottom-nav-h: 64px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  font-family: 'DM Sans', sans-serif;
  background: var(--gray-50);
  color: var(--gray-800);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overflow-x: hidden;
}

h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--green-400); border-radius: 99px; }

/* ═══════════════════════════════
   NAVBAR (desktop)
═══════════════════════════════ */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: 60px;
  background: linear-gradient(100deg, var(--green-900) 0%, var(--green-800) 55%, var(--green-700) 100%);
  display: flex; align-items: center; gap: 0;
  padding: 0 1.4rem;
  box-shadow: 0 2px 24px rgba(0,0,0,.35);
}
.nav-brand {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem;
  color: var(--green-200); white-space: nowrap; margin-right: 1.5rem;
  letter-spacing: -.5px; flex-shrink: 0;
}
.nav-brand span { color: var(--green-400); }

.nav-links { display: flex; gap: 2px; flex: 1; overflow-x: auto; }
.nav-links::-webkit-scrollbar { display: none; }
.nav-btn {
  background: transparent; border: none; cursor: pointer;
  color: var(--green-200); font-family: 'DM Sans', sans-serif;
  font-size: .8rem; font-weight: 600; padding: 7px 12px; border-radius: 7px;
  transition: background .15s, color .15s;
  white-space: nowrap; letter-spacing: .2px; flex-shrink: 0;
}
.nav-btn:hover  { background: rgba(255,255,255,.12); color: #fff; }
.nav-btn.active { background: rgba(255,255,255,.2); color: #fff;
                  box-shadow: inset 0 -2px 0 var(--green-400); }

.nav-right { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-shrink: 0; }
.nav-select {
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
  color: var(--green-50); border-radius: 8px; padding: 5px 8px;
  font-size: .75rem; font-weight: 600; cursor: pointer; outline: none;
  font-family: inherit; max-width: 100px;
}
.nav-select option { background: var(--green-800); }

/* ── Hamburger (mobile only) ── */
.hamburger {
  display: none; flex-direction: column; gap: 5px; cursor: pointer;
  background: transparent; border: none; padding: 8px; border-radius: 8px;
  transition: background .15s; margin-left: auto;
}
.hamburger:hover { background: rgba(255,255,255,.12); }
.hamburger span {
  display: block; width: 22px; height: 2px;
  background: var(--green-200); border-radius: 99px;
  transition: transform .25s, opacity .25s;
}
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ── Mobile Drawer ── */
.mobile-drawer {
  position: fixed; top: 60px; left: 0; right: 0; bottom: 0; z-index: 999;
  background: var(--green-900);
  transform: translateX(-100%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column; padding: 1.2rem 1rem;
  overflow-y: auto;
}
.mobile-drawer.open { transform: translateX(0); }
.mobile-drawer-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: 12px; cursor: pointer;
  color: var(--green-200); font-weight: 600; font-size: 1rem;
  border: none; background: transparent; text-align: left; width: 100%;
  transition: background .15s;
}
.mobile-drawer-item:hover { background: rgba(255,255,255,.1); }
.mobile-drawer-item.active { background: rgba(255,255,255,.18); color: #fff;
                              border-left: 3px solid var(--green-400); }
.mobile-drawer-selects { display: flex; gap: 8px; padding: 12px 4px; margin-top: auto; }
.mobile-drawer-selects select {
  flex: 1; padding: 9px 10px; background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.2); color: var(--green-50);
  border-radius: 10px; font-size: .85rem; font-family: inherit;
  font-weight: 600; outline: none;
}
.mobile-drawer-selects select option { background: var(--green-800); }

/* ── Bottom Nav (mobile only) ── */
.bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 998;
  height: var(--bottom-nav-h);
  background: var(--green-900);
  box-shadow: 0 -4px 20px rgba(0,0,0,.3);
  border-top: 1px solid rgba(255,255,255,.08);
  justify-content: space-around; align-items: center;
  padding: 0 4px;
  padding-bottom: env(safe-area-inset-bottom);
}
.bnav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer; padding: 8px 10px; border-radius: 12px;
  background: transparent; border: none; flex: 1;
  transition: background .15s;
}
.bnav-item:hover { background: rgba(255,255,255,.08); }
.bnav-item.active { background: rgba(255,255,255,.15); }
.bnav-icon { font-size: 1.3rem; line-height: 1; }
.bnav-label { font-size: .62rem; font-weight: 700; color: var(--green-400); letter-spacing: .4px; text-transform: uppercase; }
.bnav-item.active .bnav-label { color: var(--white); }

/* ═══════════════════════════════
   LAYOUT
═══════════════════════════════ */
.main {
  margin-top: 60px;
  min-height: calc(100vh - 60px);
  padding: 1.5rem;
  max-width: 1200px;
  margin-left: auto;
  margin-right: auto;
}

/* ═══════════════════════════════
   MOBILE ACCESS BANNER
═══════════════════════════════ */
.mobile-access-banner {
  background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
  border-radius: var(--radius); padding: 1.2rem 1.4rem;
  color: white; margin-bottom: 1.5rem;
  display: flex; align-items: flex-start; gap: 14px;
}
.mobile-access-banner .icon { font-size: 2rem; flex-shrink: 0; }
.mobile-access-banner h4 { font-size: 1rem; margin-bottom: .3rem; }
.mobile-access-banner p  { font-size: .83rem; opacity: .9; line-height: 1.5; }
.mobile-access-banner code {
  background: rgba(0,0,0,.25); border-radius: 5px; padding: 2px 7px;
  font-family: monospace; font-size: .82rem; letter-spacing: .5px;
}
.install-steps { margin-top: .6rem; }
.install-steps li { font-size: .82rem; opacity: .9; margin-bottom: 3px; list-style: none; padding-left: 14px; }
.install-steps li::before { content: "→ "; }

/* ═══════════════════════════════
   HERO
═══════════════════════════════ */
.hero {
  background: linear-gradient(135deg, var(--green-900) 0%, var(--green-800) 55%, var(--green-600) 100%);
  border-radius: 20px; padding: 2rem 2rem 2rem; color: var(--green-50);
  margin-bottom: 1.5rem; position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; top: -60px; right: -40px;
  width: 200px; height: 200px; border-radius: 50%;
  background: rgba(116,198,157,.12); pointer-events: none;
}
.hero h1 { font-size: 1.9rem; font-weight: 800; color: var(--green-200); margin-bottom: .4rem; }
.hero p  { font-size: .95rem; color: var(--green-50); opacity: .85; }

/* ═══════════════════════════════
   CARDS
═══════════════════════════════ */
.card {
  background: var(--white); border-radius: var(--radius); padding: 1.3rem 1.5rem;
  box-shadow: var(--shadow-md); margin-bottom: 1rem;
}
.card-border-high   { border-left: 4px solid var(--red); }
.card-border-medium { border-left: 4px solid var(--orange); }
.card-border-low    { border-left: 4px solid var(--green-600); }

/* ═══════════════════════════════
   GRID
═══════════════════════════════ */
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; }
.grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 1rem; }
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; }

/* ═══════════════════════════════
   METRIC TILES
═══════════════════════════════ */
.metric {
  background: var(--white); border-radius: var(--radius); padding: 1.1rem 1.2rem;
  box-shadow: var(--shadow-sm); text-align: center;
}
.metric-val { font-size: 1.7rem; font-weight: 800; font-family: 'Syne', sans-serif; color: var(--green-800); }
.metric-lbl { font-size: .72rem; font-weight: 600; color: var(--gray-400); margin-top: 3px; text-transform: uppercase; letter-spacing: .6px; }
.metric-delta { font-size: .78rem; color: var(--green-600); font-weight: 700; }

/* ═══════════════════════════════
   BUTTONS
═══════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
  border: none; border-radius: 10px; padding: 11px 20px;
  font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 700;
  transition: all .18s; outline: none; touch-action: manipulation;
}
.btn-primary {
  background: linear-gradient(135deg, var(--green-700), var(--green-600));
  color: #fff; box-shadow: 0 4px 14px rgba(45,106,79,.35);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(45,106,79,.45); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-outline { background: transparent; color: var(--green-700); border: 2px solid var(--green-600); }
.btn-outline:hover { background: var(--green-50); }
.btn-full { width: 100%; justify-content: center; }

/* ═══════════════════════════════
   UPLOAD
═══════════════════════════════ */
.upload-zone {
  border: 2px dashed var(--green-400); border-radius: var(--radius);
  padding: 2.5rem 1.5rem; text-align: center; background: var(--green-50);
  cursor: pointer; transition: border-color .2s, background .2s;
}
.upload-zone:hover, .upload-zone:active { border-color: var(--green-700); background: #c6f0d4; }
.upload-icon { font-size: 2.8rem; margin-bottom: .8rem; display: block; }

/* ═══════════════════════════════
   CAMERA
═══════════════════════════════ */
.camera-wrapper { border-radius: var(--radius); overflow: hidden; background: #000; position: relative; }
.camera-wrapper video { width: 100%; display: block; max-height: 300px; object-fit: cover; }

/* ═══════════════════════════════
   TABS
═══════════════════════════════ */
.tabs {
  display: flex; border-bottom: 2px solid var(--gray-200);
  margin-bottom: 1.3rem; gap: 2px; overflow-x: auto;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 9px 14px; cursor: pointer; border: none; background: transparent;
  font-family: 'DM Sans', sans-serif; font-size: .84rem; font-weight: 600;
  color: var(--gray-400); border-radius: 8px 8px 0 0;
  transition: color .15s, background .15s; white-space: nowrap; flex-shrink: 0;
}
.tab:hover { color: var(--green-700); background: var(--gray-100); }
.tab.active { color: var(--green-800); border-bottom: 2px solid var(--green-700);
              background: var(--white); margin-bottom: -2px; }

/* ═══════════════════════════════
   CONFIDENCE BAR
═══════════════════════════════ */
.conf-bar { background: var(--gray-200); border-radius: 99px; height: 10px; overflow: hidden; }
.conf-fill { height: 100%; border-radius: 99px;
             background: linear-gradient(90deg, var(--green-600), var(--green-400));
             transition: width .6s cubic-bezier(.4,0,.2,1); }

/* ═══════════════════════════════
   WEATHER
═══════════════════════════════ */
.wx-ok   { background: #dcfce7; color: #15803d; border-radius: var(--radius-sm); padding: 12px 16px; font-weight: 700; }
.wx-wait { background: #fef9c3; color: #a16207; border-radius: var(--radius-sm); padding: 12px 16px; font-weight: 700; }
.wx-no   { background: #fee2e2; color: #b91c1c; border-radius: var(--radius-sm); padding: 12px 16px; font-weight: 700; }

/* ═══════════════════════════════
   TAGS
═══════════════════════════════ */
.tag { display: inline-block; background: var(--green-50); color: var(--green-700);
       border-radius: 99px; padding: 2px 11px; font-size: .76rem; font-weight: 700;
       margin: 2px; border: 1px solid var(--green-200); }
.tag-high   { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
.tag-medium { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }

/* ═══════════════════════════════
   VOICE BANNER
═══════════════════════════════ */
.voice-banner {
  background: linear-gradient(90deg, var(--green-800), var(--green-600));
  color: var(--green-200); border-radius: var(--radius); padding: .9rem 1.2rem;
  font-weight: 700; font-size: .95rem; display: flex; align-items: center; gap: 10px;
  margin: .8rem 0;
}
.pulse { animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

/* ═══════════════════════════════
   REMEDY
═══════════════════════════════ */
.remedy-box {
  background: var(--green-50); border: 1px solid var(--green-200);
  border-radius: var(--radius); padding: 1.1rem 1.3rem;
  white-space: pre-wrap; font-size: .91rem; line-height: 1.85;
  color: var(--green-900);
}

/* ═══════════════════════════════
   ALERTS
═══════════════════════════════ */
.alert { border-radius: var(--radius-sm); padding: 10px 14px; font-size: .86rem; font-weight: 600; margin-bottom: .5rem; }
.alert-green  { background: #dcfce7; color: #15803d; }
.alert-red    { background: #fee2e2; color: #b91c1c; }
.alert-yellow { background: #fef9c3; color: #a16207; }
.alert-blue   { background: #dbeafe; color: #1d4ed8; }

/* ═══════════════════════════════
   SPINNER
═══════════════════════════════ */
.spinner {
  width: 38px; height: 38px; border: 4px solid var(--green-200);
  border-top-color: var(--green-600); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 2rem auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════════════════════════
   TREATMENT CARD
═══════════════════════════════ */
.treatment-card { background: var(--gray-50); border-radius: var(--radius-sm);
                  padding: .9rem 1.1rem; border: 1px solid var(--gray-200); margin-bottom: .5rem; }
.treatment-card h4 { color: var(--green-800); margin-bottom: .3rem; font-size: .88rem; }
.treatment-card p  { font-size: .82rem; color: var(--gray-600); margin-bottom: .15rem; }

/* ═══════════════════════════════
   EXPANDER
═══════════════════════════════ */
.expander { border: 1px solid var(--gray-200); border-radius: var(--radius-sm); margin-bottom: .5rem; overflow: hidden; }
.expander-header {
  padding: .85rem 1.1rem; cursor: pointer; display: flex; justify-content: space-between;
  align-items: center; background: var(--white); font-weight: 600; font-size: .88rem;
  transition: background .15s; user-select: none;
}
.expander-header:hover { background: var(--gray-50); }
.expander-body { padding: .9rem 1.1rem; background: var(--white); border-top: 1px solid var(--gray-100); }

/* ═══════════════════════════════
   TABLE
═══════════════════════════════ */
.data-table { width: 100%; border-collapse: collapse; font-size: .83rem; }
.data-table th { background: var(--green-800); color: var(--green-200); padding: 9px 12px; text-align: left; white-space: nowrap; }
.data-table td { padding: 8px 12px; border-bottom: 1px solid var(--gray-200); }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--green-50); }

/* ═══════════════════════════════
   PROBA CHART
═══════════════════════════════ */
.proba-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.proba-label { width: 130px; font-size: .78rem; font-weight: 600; color: var(--gray-600); flex-shrink: 0; text-align: right; }
.proba-bar-wrap { flex: 1; background: var(--gray-200); border-radius: 99px; height: 7px; }
.proba-bar { height: 7px; border-radius: 99px; background: linear-gradient(90deg, var(--green-600), var(--green-400)); transition: width .5s; }
.proba-pct { width: 38px; font-size: .76rem; font-weight: 700; color: var(--green-700); }

/* ═══════════════════════════════
   IMAGE PREVIEW
═══════════════════════════════ */
.img-preview { width: 100%; border-radius: var(--radius); object-fit: cover; max-height: 280px; display: block; }

/* ═══════════════════════════════
   FOOTER
═══════════════════════════════ */
.footer { text-align: center; padding: 2rem 1rem; color: var(--gray-400); font-size: .78rem; margin-top: 1.5rem; }

/* ═══════════════════════════════
   INSTALL PROMPT TOAST
═══════════════════════════════ */
.install-toast {
  position: fixed; bottom: calc(var(--bottom-nav-h) + 12px); left: 12px; right: 12px; z-index: 2000;
  background: var(--green-800); color: white; border-radius: 14px;
  padding: 14px 16px; box-shadow: 0 8px 32px rgba(0,0,0,.4);
  display: flex; align-items: center; gap: 12px;
  animation: slideUp .35s ease;
}
@keyframes slideUp { from { transform: translateY(80px); opacity:0; } to { transform: translateY(0); opacity:1; } }
.install-toast-text { flex: 1; font-size: .88rem; font-weight: 600; }
.install-toast-text span { display: block; font-size: .78rem; opacity: .75; font-weight: 400; }
.install-toast-btn {
  background: var(--green-400); color: var(--green-900); border: none;
  border-radius: 9px; padding: 8px 14px; font-weight: 800; font-size: .82rem;
  cursor: pointer; flex-shrink: 0;
}
.install-toast-close {
  background: transparent; border: none; color: rgba(255,255,255,.6);
  font-size: 1.2rem; cursor: pointer; padding: 4px; line-height: 1;
}

/* ═══════════════════════════════
   MOBILE ACCESS INFO MODAL
═══════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 3000;
  background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
  display: flex; align-items: flex-end; justify-content: center; padding: 0;
}
.modal-sheet {
  background: white; border-radius: 20px 20px 0 0; width: 100%; max-width: 600px;
  padding: 1.5rem; max-height: 85vh; overflow-y: auto;
  animation: sheetUp .3s ease;
}
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 40px; height: 4px; background: var(--gray-200); border-radius: 99px; margin: 0 auto 1.2rem; }

/* ═══════════════════════════════
   QR CODE AREA
═══════════════════════════════ */
.qr-container { text-align: center; padding: 1rem; }
.qr-frame {
  width: 160px; height: 160px; margin: 0 auto 1rem;

<script>

  const sw = `
    const CACHE = 'rural-advisory-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./'])));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
    });
  `;
  const blob = new Blob([sw], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>

function buildRemedy(info, language) {
  const name = language==="Tamil" ? (info.tamil_name||info.name)
             : language==="Hindi" ? (info.hindi_name||info.name)
             : info.name;
  const chem = (info.treatment?.chemical||[]).slice(0,2);
  const org  = (info.treatment?.organic||[]).slice(0,2);
  const prec = (info.precautions||[]).slice(0,3);
  const fmtC = items => items.map(c=>`  • ${c.name} — ${c.dosage}`).join("\n") || "  • —";
  const fmtP = items => items.map(p=>`  • ${p}`).join("\n");
  if(language==="Tamil") return `வணக்கம் விவசாயி!\n\nஉங்கள் பயிரில் ${name} நோய் கண்டறியப்பட்டுள்ளது.\n\nஇரசாயன சிகிச்சை:\n${fmtC(chem)}\n\nஇயற்கை சிகிச்சை:\n${fmtC(org)}\n\nமுன்னெச்சரிக்கைகள்:\n${fmtP(prec)}\n\nநன்றி! வாழ்க விவசாயம்!`;
  if(language==="Hindi") return `नमस्ते किसान!\n\nआपकी फसल में ${name} रोग पाया गया है।\n\nरासायनिक उपचार:\n${fmtC(chem)}\n\nजैविक उपचार:\n${fmtC(org)}\n\nसावधानियां:\n${fmtP(prec)}\n\nधन्यवाद! किसान आगे बढ़ें!`;
  return `Hello Farmer!\n\nYour crop has been diagnosed with ${name}.\n\nChemical Treatment:\n${fmtC(chem)}\n\nOrganic Treatment:\n${fmtC(org)}\n\nPrecautions:\n${fmtP(prec)}\n\nThank you! Happy farming!`;
}

function DetectionPage({ language, location, diseaseDb }) {
  const T = TRANSLATIONS[language];
  const [inputMode, setInputMode] = useState("upload");
  const [imageFile, setImageFile] = useState(null);
  const [imagePreview, setImagePreview] = useState(null);
  const [result, setResult] = useState(null);
  const [analyzing, setAnalyzing] = useState(false);
  const [activeTab, setActiveTab] = useState("disease");
  const [audioSrc, setAudioSrc] = useState(null);
  const [audioLoading, setAudioLoading] = useState(false);
  const [camStream, setCamStream] = useState(null);
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const audioRef = useRef(null);
  const fileInputRef = useRef(null);

  const startCamera = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:"environment" } });
      setCamStream(stream);
      if(videoRef.current) videoRef.current.srcObject = stream;
    } catch(e) { alert("Camera access denied: " + e.message); }
  };
  const stopCamera = () => {
    if(camStream) { camStream.getTracks().forEach(t=>t.stop()); setCamStream(null); }
  };
  useEffect(()=>{ if(inputMode==="camera") startCamera(); else stopCamera(); return ()=>stopCamera(); }, [inputMode]);

  const capture = () => {
    const video = videoRef.current, canvas = canvasRef.current;
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video,0,0);
    canvas.toBlob(blob=>{
      const file = new File([blob],"capture.jpg",{type:"image/jpeg"});
      setImageFile(file); setImagePreview(URL.createObjectURL(blob));
      stopCamera(); setInputMode("upload");
    },"image/jpeg",0.9);
  };

  const handleFile = e => {
    const file = e.target.files[0]; if(!file) return;
    setImageFile(file); setImagePreview(URL.createObjectURL(file));
    setResult(null); setAudioSrc(null);
  };

  const analyze = async () => {
    if(!imageFile) return;
    setAnalyzing(true); setResult(null); setAudioSrc(null);
    try {
      const fd = new FormData(); fd.append("file", imageFile);
      const res = await fetch(`${API}/api/analyze`, { method:"POST", body:fd });
      if(!res.ok) throw new Error(await res.text());
      const data = await res.json(); setResult(data);
      if(data.disease_info) {
        setAudioLoading(true);
        const remedy = buildRemedy(data.disease_info, language);
        try {
          const ttsRes = await fetch(`${API}/api/tts`, {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ text:remedy, language }),
          });
          if(ttsRes.ok) {
            const blob = await ttsRes.blob();
            const url  = URL.createObjectURL(blob);
            setAudioSrc(url);
            setTimeout(()=>{ if(audioRef.current) audioRef.current.play().catch(()=>{}); }, 300);
          }
        } catch(e) { console.warn("TTS failed:", e); }
        setAudioLoading(false);
      }
    } catch(e) {
      alert("Analysis failed: " + e.message + "\n\nMake sure the Python backend is running:\nuvicorn main:app --reload");
    }
    setAnalyzing(false);
  };

  const info   = result?.disease_info;
  const wx     = MOCK_WEATHER[location] || MOCK_WEATHER.Other;
  const remedy = info ? buildRemedy(info, language) : "";

  return (
    <div>
      <h2 style={{marginBottom:"1.1rem",color:"#1b4332",fontSize:"1.2rem"}}>🔍 Disease Detection</h2>

      {/* Input toggle */}
      <div style={{display:"flex",gap:8,marginBottom:"1rem"}}>

            <MetricTile value={`${Math.round(result.confidence*100)}%`} label={T.confidence}/>
            <MetricTile value={`${result.processing_time}s`} label={T.proc_time}/>
          </div>
          <ConfBar value={result.confidence}/>

          {result.disease_key==="Healthy" && (

          )}

          {audioSrc && (

function DiseaseDBPage({ diseaseDb, language }) {
  const [search, setSearch] = useState("");
  const entries = Object.entries(diseaseDb).filter(([k,v])=>{
    const name = language==="Tamil"?(v.tamil_name||v.name):language==="Hindi"?(v.hindi_name||v.name):v.name;
    return !search||name.toLowerCase().includes(search.toLowerCase())||k.toLowerCase().includes(search.toLowerCase());
  });
  return (
    <div>
      <h2 style={{marginBottom:"1rem",color:"#1b4332",fontSize:"1.2rem"}}>📖 Disease Database</h2>
      <input placeholder="🔍 Search diseases…" value={search} onChange={e=>setSearch(e.target.value)}
             style={{width:"100%",padding:"10px 14px",border:"2px solid #d1fae5",borderRadius:10,fontSize:"16px",marginBottom:"1rem",outline:"none"}}/>
      {entries.length===0 && (
        <div className="alert alert-yellow">No diseases found. Make sure the backend is running.</div>
      )}
      {entries.map(([key,info])=>{
        const name = language==="Tamil"?(info.tamil_name||info.name):language==="Hindi"?(info.hindi_name||info.name):info.name;
        const sev  = info.severity;
        return (
          <Expander key={key} title={`${sev==="high"?"🔴":sev==="medium"?"🟡":"🟢"} ${name} (${sev})`}>
            <div className="grid-3" style={{marginBottom:".8rem"}}>
              <div><strong style={{fontSize:".85rem"}}>Cause:</strong><p style={{fontSize:".82rem",color:"#4b5563",marginTop:3}}>{info.cause}</p></div>
              <div><strong style={{fontSize:".85rem"}}>Affects:</strong>{(info.crops||[]).map(c=><span key={c} className="tag" style={{display:"block",margin:"2px 0"}}>{c}</span>)}</div>
              <div><strong style={{fontSize:".85rem"}}>Treatments:</strong>
                <p style={{fontSize:".82rem",color:"#4b5563",marginTop:3}}>Chemical: {(info.treatment?.chemical||[]).length} | Organic: {(info.treatment?.organic||[]).length}</p>
              </div>
            </div>
            <div className="remedy-box" style={{fontSize:".84rem"}}>{buildRemedy(info, language)}</div>
          </Expander>
        );
      })}
    </div>
  );
}

          <h3 style={{marginBottom:".8rem",marginTop:"1rem",fontSize:"1rem"}}>🌾 Primary Crops</h3>
          {["Tomato","Potato","Rice","Wheat","Cotton"].map(c=>(
            <label key={c} style={{display:"flex",alignItems:"center",gap:10,marginBottom:7,cursor:"pointer"}}>
              <input type="checkbox" defaultChecked={["Tomato","Potato"].includes(c)} style={{width:16,height:16,accentColor:"#2d6a4f"}}/>
              <span style={{fontSize:".9rem"}}>{c}</span>
            </label>
          ))}
        </div>
      </div>
      <button className="btn btn-primary" onClick={save} style={{marginTop:"1rem"}}>💾 Save Settings</button>
      {saved && <div className="alert alert-green" style={{marginTop:"1rem",display:"inline-block",marginLeft:12}}>✅ Saved!</div>}
    </div>
  );
}

/* ═══════════════════════════
   APP ROOT
═══════════════════════════ */
function App() {
  const [page,        setPage]        = useState("home");
  const [language,    setLanguage]    = useState("English");
  const [location,    setLocation]    = useState("Chennai");
  const [diseaseDb,   setDiseaseDb]   = useState({});
  const [drawerOpen,  setDrawerOpen]  = useState(false);
  const [showInstall, setShowInstall] = useState(false);
  const [deferredPrompt, setDeferredPrompt] = useState(null);

  // PWA install prompt
  useEffect(()=>{
    const handler = e => { e.preventDefault(); setDeferredPrompt(e); setShowInstall(true); };
    window.addEventListener("beforeinstallprompt", handler);
    return () => window.removeEventListener("beforeinstallprompt", handler);
  }, []);

  const handleInstall = async () => {
    if(deferredPrompt) {
      deferredPrompt.prompt();
      const result = await deferredPrompt.userChoice;
      setDeferredPrompt(null); setShowInstall(false);
    }
  };

  // Close drawer on outside tap
  useEffect(()=>{
    if(!drawerOpen) return;
    const close = e => { if(!e.target.closest(".mobile-drawer") && !e.target.closest(".hamburger")) setDrawerOpen(false); };
    document.addEventListener("click", close);
    return () => document.removeEventListener("click", close);
  }, [drawerOpen]);

  // Fetch disease DB
  useEffect(()=>{
    fetch(`${API}/api/diseases`)
      .then(r=>r.json()).then(setDiseaseDb)
      .catch(()=>console.warn("Backend not reachable."));
  }, []);

  const renderPage = () => {
    switch(page) {
      case "home":          return <HomePage diseaseDb={diseaseDb} setPage={setPage}/>;
      case "detection":     return <DetectionPage language={language} location={location} diseaseDb={diseaseDb}/>;
      case "disease_db":    return <DiseaseDBPage diseaseDb={diseaseDb} language={language}/>;
      case "history":       return <HistoryPage/>;
      case "mobile_access": return <MobileAccessPage/>;
      case "settings":      return <SettingsPage language={language} setLanguage={setLanguage} location={location} setLocation={setLocation}/>;
      case "help":          return <HelpPage/>;
      default:              return <HomePage diseaseDb={diseaseDb} setPage={setPage}/>;
    }
  };

  return (
    <>
      <Navbar page={page} setPage={setPage}
              language={language} setLanguage={setLanguage}
              location={location} setLocation={setLocation}
              drawerOpen={drawerOpen} setDrawerOpen={setDrawerOpen}/>

      <BottomNav page={page} setPage={page=>{setPage(page);setDrawerOpen(false);}}/>

      <main className="main">
        {renderPage()}
        <div className="footer">
          🌾 Rural Agricultural Advisory System v2.0 · Built for Indian Farmers · © 2026<br/>
          <span style={{fontSize:".75rem",opacity:.6}}>PWA-enabled · Mobile-optimised · Tamil / Hindi / English</span>
        </div>
      </main>

      {/* PWA Install Toast */}
      {showInstall && (
        <InstallToast onInstall={handleInstall} onClose={()=>setShowInstall(false)}/>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
